<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gems — POI Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #e8e8f0;
    --muted: #8888a0;
    --accent: #7c6af7;
    --accent-glow: rgba(124,106,247,0.15);
    --google: #4285f4;
    --reddit: #ff4500;
    --tripadvisor: #00a680;
    --youtube: #ff0000;
    --colosseum: #c8955a;
    --louvre: #6a9fd8;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

  /* ── Layout ── */
  .shell { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

  /* ── Header ── */
  header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 13px; margin-left: auto; }

  /* ── POI Switcher ── */
  .poi-bar { display: flex; gap: 8px; padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .poi-btn {
    padding: 7px 18px; border-radius: 999px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .poi-btn:hover { border-color: var(--accent); color: var(--text); }
  .poi-btn.active-colosseum { background: rgba(200,149,90,0.12); border-color: var(--colosseum); color: var(--colosseum); }
  .poi-btn.active-louvre    { background: rgba(106,159,216,0.12); border-color: var(--louvre); color: var(--louvre); }

  /* ── Chat area ── */
  .chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 28px; }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Welcome card ── */
  .welcome {
    text-align: center; padding: 40px 24px; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .welcome h2 { color: var(--text); font-size: 20px; font-weight: 600; }
  .welcome p { font-size: 14px; line-height: 1.6; max-width: 420px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .suggestion {
    padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer;
    transition: all 0.15s; font-family: inherit; text-align: left;
  }
  .suggestion:hover { border-color: var(--accent); background: var(--accent-glow); }

  /* ── Message ── */
  .msg { display: flex; flex-direction: column; gap: 4px; }
  .msg-user { align-items: flex-end; }
  .msg-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; padding: 0 4px; }
  .bubble {
    max-width: 78%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.65;
  }
  .bubble-user { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .bubble-assistant { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  /* ── Thinking ── */
  .thinking { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity:.4; } 40% { transform: translateY(-6px); opacity:1; } }

  /* ── Citations ── */
  .citations { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .cite-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; }
  .cite-cards { display: flex; flex-direction: column; gap: 6px; }
  .cite-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 13px; line-height: 1.5; display: flex; flex-direction: column; gap: 6px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .cite-top { display: flex; align-items: center; gap: 8px; }
  .source-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.4px; padding: 2px 7px;
    border-radius: 999px; text-transform: uppercase;
  }
  .src-google_review        { background: rgba(66,133,244,0.15); color: #6ba3f5; }
  .src-reddit_comment,
  .src-reddit_post          { background: rgba(255,69,0,0.15); color: #ff7247; }
  .src-tripadvisor_review   { background: rgba(0,166,128,0.15); color: #2ec9a3; }
  .src-youtube_transcript_chunk { background: rgba(255,0,0,0.12); color: #ff5555; }
  .cite-quote { color: var(--muted); font-style: italic; }
  .cite-quote::before { content: '"'; }
  .cite-quote::after  { content: '"'; }

  /* ── Confidence ── */
  .confidence { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .conf-dot { width: 7px; height: 7px; border-radius: 50%; }
  .conf-high   { background: #2ec9a3; }
  .conf-medium { background: #f5a623; }
  .conf-low    { background: #ff5555; }
  .conf-label { font-size: 11px; color: var(--muted); }

  /* ── Input ── */
  .input-area {
    padding: 16px 24px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; gap: 10px; align-items: flex-end;
  }
  textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: inherit; font-size: 14px; padding: 12px 14px;
    resize: none; min-height: 44px; max-height: 120px; line-height: 1.5; outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--accent);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { fill: #fff; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">gems<span>.</span></div>
    <div class="tagline">POI Intelligence — powered by real visitor signal</div>
  </header>

  <div class="poi-bar">
    <button class="poi-btn active-colosseum" data-poi="Colosseum" onclick="setPoi(this)">🏛 Colosseum</button>
    <button class="poi-btn" data-poi="Louvre Museum" onclick="setPoi(this)">🎨 Louvre Museum</button>
  </div>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <h2 id="welcome-title">Ask anything about the Colosseum</h2>
      <p>Answers are synthesised from thousands of real visitor reviews, Reddit threads, TripAdvisor, and YouTube — not generic SEO content.</p>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask about tickets, crowds, hidden spots, food nearby…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SUGGESTIONS = {
  "Colosseum": [
    "Best time to visit to avoid crowds?",
    "Is the underground arena tour worth it?",
    "What do most visitors regret not doing?",
    "Skip-the-line tickets — which one to buy?",
    "Best places to eat nearby?",
  ],
  "Louvre Museum": [
    "How long should I spend at the Louvre?",
    "How to avoid the queues?",
    "Which wings are most underrated?",
    "Is the Mona Lisa worth fighting the crowd for?",
    "Best cafes or restaurants near the Louvre?",
  ],
};

let currentPoi = "Colosseum";
let busy = false;

function setPoi(btn) {
  currentPoi = btn.dataset.poi;
  document.querySelectorAll(".poi-btn").forEach(b => b.className = "poi-btn");
  btn.classList.add(currentPoi === "Colosseum" ? "active-colosseum" : "active-louvre");
  document.getElementById("welcome-title").textContent = `Ask anything about the ${currentPoi}`;
  renderSuggestions();
}

function renderSuggestions() {
  const el = document.getElementById("suggestions");
  el.innerHTML = "";
  (SUGGESTIONS[currentPoi] || []).forEach(q => {
    const b = document.createElement("button");
    b.className = "suggestion";
    b.textContent = q;
    b.onclick = () => { document.getElementById("input").value = q; send(); };
    el.appendChild(b);
  });
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function send() {
  const input = document.getElementById("input");
  const query = input.value.trim();
  if (!query || busy) return;

  // Hide welcome on first message
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  input.value = "";
  input.style.height = "auto";
  setBusy(true);

  appendUser(query);
  const thinkingEl = appendThinking();

  fetch("/api/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query, poi: currentPoi }),
  })
  .then(r => r.json())
  .then(data => {
    thinkingEl.remove();
    appendAssistant(data);
  })
  .catch(err => {
    thinkingEl.remove();
    appendError(err.message || "Request failed");
  })
  .finally(() => setBusy(false));
}

function setBusy(v) {
  busy = v;
  document.getElementById("send-btn").disabled = v;
}

function appendUser(text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg msg-user";
  div.innerHTML = `<div class="msg-label">YOU</div><div class="bubble bubble-user">${esc(text)}</div>`;
  chat.appendChild(div);
  scrollBottom();
}

function appendThinking() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<div class="msg-label">GEMS</div>
    <div class="bubble bubble-assistant">
      <div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`;
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function appendAssistant(data) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";

  const confidence = data.confidence || "medium";
  const confDot = `<div class="conf-dot conf-${confidence}"></div>`;
  const citations = (data.citations || []);

  const citeHtml = citations.length ? `
    <div class="citations">
      <div class="cite-label">${citations.length} source${citations.length > 1 ? "s" : ""}</div>
      <div class="cite-cards">
        ${citations.map(c => `
          <div class="cite-card">
            <div class="cite-top">
              ${c.source_url
                ? `<a href="${c.source_url}" target="_blank" rel="noopener" class="source-badge src-${c.source}" style="text-decoration:none">${formatSource(c.source)} ↗</a>`
                : `<span class="source-badge src-${c.source}">${formatSource(c.source)}</span>`
              }
            </div>
            <div class="cite-quote">${esc(c.quote)}</div>
          </div>
        `).join("")}
      </div>
    </div>` : "";

  div.innerHTML = `
    <div class="msg-label">GEMS</div>
    <div class="bubble bubble-assistant">${esc(data.answer || data.error || "No response")}</div>
    ${citeHtml}
    <div class="confidence">${confDot}<span class="conf-label">${confidence} confidence</span></div>`;

  chat.appendChild(div);
  scrollBottom();
}

function appendError(msg) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<div class="msg-label">GEMS</div>
    <div class="bubble bubble-assistant" style="color:#ff5555">⚠ ${esc(msg)}</div>`;
  chat.appendChild(div);
  scrollBottom();
}

function formatSource(s) {
  return { google_review: "Google", reddit_comment: "Reddit", reddit_post: "Reddit",
    tripadvisor_review: "TripAdvisor", youtube_transcript_chunk: "YouTube" }[s] || s;
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}

function scrollBottom() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

// Init
renderSuggestions();
</script>
</body>
</html>
